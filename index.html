<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NULL//SHIFT</title><meta name="theme-color" content="#080b10"><link rel="stylesheet" href="style.css"></head><body><main id="landing" class="screen landing"><section class="brand"><div class="eyebrow">ONLINE SOCIAL SURVIVAL / PROTOTYPE 01</div><h1>NULL<span>//</span><br>SHIFT</h1><p class="lede">軌道研究区画に、あなたと同じ顔をした「何か」がいる。端末を復旧し、声を頼りに、本物だけで帰還せよ。</p><div class="feature-row"><span class="chip">2–8 PLAYERS</span><span class="chip">AI MIMIC</span><span class="chip">WEBRTC VOICE</span><span class="chip">SECRET ROOM</span></div></section><section class="panel"><h2>身分データを作成</h2><div class="field"><label for="name">コールサイン</label><input id="name" maxlength="16" value="CREW-07" autocomplete="off"></div><div class="maker"><canvas id="preview" class="avatar-preview" width="96" height="96"></canvas><div class="maker-controls"><div class="field"><label for="color">スーツ</label><select id="color"><option value="#78e3cf">MINT</option><option value="#5e9fe8">BLUE</option><option value="#eac26b">AMBER</option><option value="#df84a8">ROSE</option><option value="#bf8eda">VIOLET</option></select></div><div class="field"><label for="hair">ヘッド</label><select id="hair"><option value="cap">CAP</option><option value="spike">SPIKE</option><option value="round">ROUND</option><option value="antenna">ANTENNA</option></select></div></div></div><div class="actions"><button id="create" class="primary">ルームを作る</button><button id="quick" class="secondary">訓練モード</button><div class="join-row"><input id="code" maxlength="6" placeholder="6桁コード"><button id="join" class="secondary">参加</button></div></div><div id="error" class="error"></div></section></main><main id="game" class="screen game hidden"><canvas id="world"></canvas><div class="hud"><div class="topbar"><div class="status-card"><div class="label">RESTORATION</div><div id="objective" class="task-title">端末を復旧せよ</div><div class="progress"><i id="progress"></i></div></div><div class="room-card"><div class="label">ROOM CODE</div><div id="roomCode" class="room-code">------</div><div id="online" class="online">● 1 ONLINE</div></div></div><div class="health status-card"><div class="hp-row"><span>BIO-SIGNAL</span><span id="hpText">100%</span></div><div class="hpbar"><i id="hpbar"></i></div></div><div class="controls"><span class="key"><b>WASD</b>移動</span><span class="key"><b>E</b>操作</span><span class="key"><b>SPACE</b>パルス</span><span class="key"><b>ENTER</b>チャット</span></div><div id="toast" class="toast"></div><div class="chat"><div id="messages" class="messages"></div><input id="chatInput" class="chat-input" maxlength="120" placeholder="メッセージを入力…"></div><button id="voice" class="voice-button">V　VOICE OFF</button><div id="endModal" class="modal hidden"><div class="modal-card"><div id="endIcon" class="icon">◇</div><h2 id="endTitle">任務完了</h2><p id="endText"></p><button class="primary" onclick="location.reload()">ロビーへ戻る</button></div></div></div></main><script src="app.js"></script></body></html>
